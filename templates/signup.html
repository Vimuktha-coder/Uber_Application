{% extends 'base.html' %}

{% block title %}Uber - Sign up{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 24px; line-height: 1.3;">Create an account</h2>
        
        {% if error %}
        <div style="background: rgba(255,0,0,0.2); color: #ffeb3b; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'signup' %}">
            {% csrf_token %}
            <!-- For hackathon functionality, we silently collect the required backend fields here nicely stacked -->
            <div style="margin-bottom: 16px;">
                <input type="text" name="username" placeholder="Choose a username" class="form-control" required>
            </div>
            <div style="margin-bottom: 16px;">
                <input type="tel" name="phone" placeholder="Enter phone number" pattern="[0-9]*" class="form-control" required>
            </div>
            <div style="margin-bottom: 16px;">
                <input type="email" name="email" placeholder="Email address" class="form-control" required>
            </div>
            <div style="margin-bottom: 24px;">
                <input type="password" name="password" placeholder="Create Password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn-search">
                Continue
            </button>
        </form>
        
        <div style="display: flex; align-items: center; margin-bottom: 24px; margin-top:24px;">
            <div style="flex: 1; height: 1px; background-color: var(--glass-border);"></div>
            <span style="padding: 0 16px; color: var(--text-secondary); font-size: 14px;">or</span>
            <div style="flex: 1; height: 1px; background-color: var(--glass-border);"></div>
        </div>

        <button type="button" onclick="alert('OAuth Integration (Google/Apple) requires live developer API keys. Please use the standard manual signup form above for this demo.')" class="icon-btn" style="width: 100%; justify-content: center; margin-bottom: 12px; padding: 14px;">
            <!-- Simple colored 'G' logic -->
            <span style="font-weight: 700; margin-right: 12px;">
                <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
            </span>
            Continue with Google
        </button>
        
        <button type="button" onclick="alert('OAuth Integration (Google/Apple) requires live developer API keys. Please use the standard manual signup form above for this demo.')" class="icon-btn" style="width: 100%; justify-content: center; margin-bottom: 24px; padding: 14px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="margin-right: 12px; stroke:white;">
                <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 14 c-1.6 0-2.8-1.2-2.8-2.8 0-.9.4-1.7 1-2.2-.6-.4-1.4-.7-2.3-.7-1.9 0-3.4 1.5-3.4 3.4 0 1.9 1.5 3.4 3.4 3.4 1 0 1.9-.5 2.5-1.2-.5-.3-.9-.9-.9-1.5 0-1.1.9-2 2-2h.5V16z" />
            </svg>
            Continue with Apple
        </button>
        
        <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-top: 32px; text-align: center;">
            By continuing, you agree to calls, including by autodialer, WhatsApp, or texts from Uber and its affiliates.
        </p>

    </div>
</div>
{% endblock %}
