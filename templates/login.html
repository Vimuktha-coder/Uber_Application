{% extends 'base.html' %}

{% block title %}Log in - Uber Clone{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2 style="font-size: 28px; font-weight: 700; margin-bottom: 24px; color: var(--text-primary);">Log in</h2>
        
        {% if error %}
        <div style="background: rgba(255,0,0,0.2); color: #ffeb3b; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div style="margin-bottom: 16px;">
                <input type="text" name="username" placeholder="Enter email or username" class="form-control" required style="padding: 16px;">
            </div>
            <div style="margin-bottom: 24px;">
                <input type="password" name="password" placeholder="Password" class="form-control" required style="padding: 16px;">
            </div>
            
            <button type="submit" class="btn-search">
                Continue
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <p style="color: var(--text-secondary); margin-bottom: 16px;">or</p>
            <p style="font-size: 15px; color: var(--text-secondary);">
                Don't have an account? <a href="{% url 'signup' %}" style="color: var(--text-primary); font-weight: 700;">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
